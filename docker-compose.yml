version: "3.9"

services:
  api:
    build:
      context: .
      target: runtime
    container_name: costguard-api
    ports:
      - "8000:8000"
    environment:
      - API_HOST=0.0.0.0
      - API_PORT=8000
      - CORS_ORIGINS=http://localhost:8501
    env_file:
      - .env
    volumes:
      - /tmp/costguard:/tmp/costguard
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  ui:
    build:
      context: .
      target: runtime
    container_name: costguard-ui
    command: streamlit run frontend/app.py --server.port=8501 --server.address=0.0.0.0
    ports:
      - "8501:8501"
    environment:
      - API_BASE_URL=http://api:8000
    env_file:
      - .env
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped

volumes:
  uploads:
