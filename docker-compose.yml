services:
  api:
    build:
      context: .
      target: runtime
    container_name: costguard-api
    ports:
      - "8000:8000"
    environment:
      - API_HOST=0.0.0.0
      - API_PORT=8000
      - APP_ENV=production
      - CORS_ORIGINS=http://localhost:8501
      # SQLite DB path — mounted to a named volume so it survives restarts
      - COSTGUARD_DB_PATH=/data/costguard_history.db
    env_file:
      - .env
    volumes:
      - costguard-data:/data
      - /tmp/costguard:/tmp/costguard
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  ui:
    build:
      context: .
      target: runtime
    container_name: costguard-ui
    command: >
      streamlit run frontend/app.py
        --server.port=8501
        --server.address=0.0.0.0
        --server.headless=true
        --server.enableCORS=false
        --browser.gatherUsageStats=false
    ports:
      - "8501:8501"
    environment:
      - API_BASE_URL=http://api:8000
      - COSTGUARD_DB_PATH=/data/costguard_history.db
    env_file:
      - .env
    volumes:
      - costguard-data:/data
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped

  # Optional: Prometheus + Grafana monitoring stack
  # Start with: docker compose --profile monitoring up
  prometheus:
    image: prom/prometheus:v2.53.0
    container_name: costguard-prometheus
    profiles: ["monitoring"]
    ports:
      - "9090:9090"
    volumes:
      - ./deploy/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=30d"
    restart: unless-stopped

  grafana:
    image: grafana/grafana:11.1.0
    container_name: costguard-grafana
    profiles: ["monitoring"]
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-costguard}
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana-data:/var/lib/grafana
      - ./deploy/grafana/dashboards/dashboards.yml:/etc/grafana/provisioning/dashboards/dashboards.yml:ro
      - ./deploy/grafana/dashboards/costguard.json:/etc/grafana/provisioning/dashboards/costguard.json:ro
      - ./deploy/grafana/datasources:/etc/grafana/provisioning/datasources:ro
    depends_on:
      - prometheus
    restart: unless-stopped

volumes:
  costguard-data:
    driver: local
  prometheus-data:
    driver: local
  grafana-data:
    driver: local
