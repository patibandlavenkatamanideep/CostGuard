# fly.toml — CostGuard on Fly.io
# https://fly.io/docs/reference/configuration/
#
# One-time setup:
#   fly auth login
#   fly apps create costguard-<yourname>     # must be globally unique
#   fly volumes create costguard_data --region iad --size 1
#   fly secrets set SECRET_KEY=$(openssl rand -hex 32)
#   fly secrets set OPENAI_API_KEY=sk-...    # at least one provider
#   fly deploy
#
# After first deploy:
#   fly open           → opens the live URL
#   fly logs           → tail logs
#   fly ssh console    → shell into the running container

app            = "costguard"   # change to your unique app name
primary_region = "iad"         # iad=US-East  lhr=London  sin=Singapore  nrt=Tokyo

[build]
  dockerfile = "Dockerfile"

[env]
  APP_ENV           = "production"
  LOG_LEVEL         = "INFO"
  API_PORT          = "9000"
  PORT              = "8501"
  COSTGUARD_DB_PATH = "/data/costguard_history.db"

[http_service]
  internal_port        = 8501
  force_https          = true
  auto_stop_machines   = false   # always-on — no cold-start on free allowance
  auto_start_machines  = true
  min_machines_running = 1

  [[http_service.checks]]
    grace_period = "30s"
    interval     = "30s"
    method       = "GET"
    path         = "/_stcore/health"
    timeout      = "10s"

# Persistent volume — SQLite survives deploys and restarts
[mounts]
  source      = "costguard_data"
  destination = "/data"

[[vm]]
  cpu_kind  = "shared"
  cpus      = 1
  memory_mb = 512
