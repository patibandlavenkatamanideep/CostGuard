services:
  - type: web
    name: costguard
    env: docker
    dockerfilePath: ./Dockerfile
    # start.sh launches FastAPI on :8000 (internal) + Streamlit on $PORT (public)
    dockerCommand: bash scripts/start.sh
    plan: free
    healthCheckPath: /_stcore/health
    envVars:
      - key: APP_ENV
        value: production
      - key: LOG_LEVEL
        value: INFO
      - key: API_PORT
        value: "8000"
      # ── Add your API keys in the Render dashboard ───────────────────────────
      # These are optional — without them the app runs in Simulation Mode.
      - key: OPENAI_API_KEY
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: XAI_API_KEY
        sync: false
